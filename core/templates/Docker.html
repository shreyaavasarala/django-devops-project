<h1>📦 Docker Overview</h1>

<p>Docker is used to containerize the Django application.</p>

<ul>
    <li>Ensures same environment everywhere</li>
    <li>Packages dependencies</li>
    <li>Runs using container</li>
</ul>

<p>Command used:</p>

<pre>docker run -p 8001:8000 django-devops-app</pre>
